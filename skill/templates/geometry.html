<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Geometry — threejs-scenes</title>
  <style>
    html, body { margin: 0; height: 100%; background: #0a0a14; overflow: hidden; }
    canvas { display: block; width: 100vw; height: 100vh; touch-action: none; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://esm.sh/three@0.184.0",
      "three/addons/": "https://esm.sh/three@0.184.0/examples/jsm/",
      "@tuomashatakka/canvas-loop-framecapper": "https://esm.sh/@tuomashatakka/canvas-loop-framecapper@1.0.0",
      "react": "https://esm.sh/react@19",
      "@scenes": "https://esm.sh/@tuomashatakka/threejs-scenes@1.7.3?external=three,@tuomashatakka/canvas-loop-framecapper"
    }
  }
  </script>
</head>
<body>
  <canvas id="app"></canvas>
  <script type="module">
    import * as THREE from 'three'
    import {
      bootstrapScene, createStandardMaterial,
      createExtrudedMesh, starShape, gearShape, roundedRectShape,
      applyTwist, applyTaper, displaceByNoise, layoutGrid,
    } from '@scenes'

    const canvas = document.getElementById('app')

    bootstrapScene({
      canvas,
      onSetup ({ scene }) {
        // a small catalogue of programmatic meshes, each deformed differently
        const star = createExtrudedMesh({ shape: starShape(5, 1, 0.5), depth: 0.6, material: createStandardMaterial('gold') })

        const gear = createExtrudedMesh({ shape: gearShape(12, 1, 0.35, 0.3), depth: 0.4, material: createStandardMaterial('metal') })

        const panel = createExtrudedMesh({ shape: roundedRectShape(1.8, 1.2, 0.3), depth: 0.3, material: createStandardMaterial('plastic', { color: '#5fb0ff' }) })
        applyTaper(panel.geometry, 0.4, 'y')

        const twisted = createExtrudedMesh({ shape: roundedRectShape(1.4, 1.4, 0.2), depth: 1.2, material: createStandardMaterial('plastic', { color: '#d94f9f' }) })
        applyTwist(twisted.geometry, Math.PI, 'z')

        const rock = new THREE.Mesh(
          displaceByNoise(new THREE.IcosahedronGeometry(1, 3), { amp: 0.25, freq: 1.2, seed: 7 }),
          createStandardMaterial('matte', { color: '#8a7f72', flatShading: true }),
        )

        const blob = new THREE.Mesh(
          displaceByNoise(new THREE.SphereGeometry(1, 32, 32), { amp: 0.15, freq: 3, seed: 11 }),
          createStandardMaterial('chrome'),
        )

        const items = [ star, gear, panel, twisted, rock, blob ]
        layoutGrid(items, { cols: 3, spacing: 3 })

        const group = new THREE.Group()
        items.forEach(m => group.add(m))
        scene.add(group)

        return ({ delta }) => { group.rotation.y += delta * 0.2 }
      },
    })
  </script>
</body>
</html>
