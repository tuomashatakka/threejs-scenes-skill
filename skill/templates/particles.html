<!DOCTYPE html>
<!--
  particles.html — particle systems v2
  ────────────────────────────────────
  createEmitter: emitter shapes, rate + burst emission, colour/alpha/size
  curves over lifetime, deterministic (seed + tick sequence -> identical runs).
  createGpuEmitter: GPGPU steady-state field for six-figure particle counts.
  Library-backed: imports @scenes from the local lib/dist via importmap.
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>threejs-scenes · particles v2</title>
  <style>
    html, body { margin: 0; height: 100%; background: #050208; overflow: hidden; font-family: ui-monospace, monospace }
    main { position: fixed; inset: 0 }
    canvas { display: block; width: 100%; height: 100%; touch-action: none }
    aside { position: fixed; top: 12px; left: 12px; padding: 8px 12px; color: #ffc0e0;
      background: rgba(5, 2, 8, 0.7); border: 1px solid #3a2233; border-radius: 6px;
      font-size: 12px; line-height: 1.8 }
    aside b { color: #ff9fd0 }
    button { font: 12px ui-monospace, monospace; margin: 2px 4px 2px 0; padding: 4px 8px;
      background: #1a0f18; color: #ffc0e0; border: 1px solid #3a2233; border-radius: 4px; cursor: pointer }
    button[aria-pressed="true"] { background: #ff9fd0; color: #1a0f18; font-weight: 700 }
  </style>
</head>
<body>
  <main>
    <canvas id="scene"></canvas>
    <aside>
      <div>particles v2 · <b id="count">–</b> particles · <b id="fps">–</b> fps</div>
      <div id="shapes"></div>
      <div>
        <button id="burst">burst 500</button>
        <button id="gpu" aria-pressed="false">GPU field (65k)</button>
      </div>
    </aside>
  </main>

  <script type="importmap">
  {
    "imports": {
      "three":          "https://esm.sh/three@0.184.0",
      "three/addons/":  "https://esm.sh/three@0.184.0/addons/",
      "@scenes":        "../lib/dist/index.js"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three'
    import { bootstrapScene, createEmitter, createGpuEmitter } from '@scenes'

    const SHAPES = {
      fountain: { shape: { kind: 'cone', angle: 0.35, radius: 0.3 }, speed: [4, 7], gravity: [0, -6, 0], color: [[0, '#fff3b0'], [0.4, '#ff9fd0'], [1, '#7733ff']] },
      sphere:   { shape: { kind: 'sphere', radius: 0.2 }, speed: [1.5, 3], gravity: [0, 0, 0], color: [[0, '#9fe8ff'], [1, '#2244ff']] },
      disc:     { shape: { kind: 'disc', radius: 3 }, speed: [0.5, 1.2], gravity: [0, 0.8, 0], color: [[0, '#b0ffc8'], [1, '#118855']] },
      box:      { shape: { kind: 'box', size: [6, 0.5, 6] }, speed: [0.05, 0.2], gravity: [0, -0.15, 0], color: [[0, '#ffffff'], [1, '#8899bb']] },
    }

    let emitter = null
    let gpuMode = false
    let sceneRef = null
    let rendererRef = null

    function mount (name) {
      if (emitter) {
        sceneRef.remove(emitter.object)
        emitter.dispose()
      }
      if (gpuMode) {
        emitter = createGpuEmitter(rendererRef, {
          capacity: 65536,
          shape:    { kind: 'sphere', radius: 6, shell: true },
          speed:    [0.05, 0.3],
          gravity:  [0, 0, 0],
          lifetime: [3, 8],
          size:     0.35,
          color:    [[0, '#9fe8ff'], [0.5, '#ff9fd0'], [1, '#7733ff']],
          seed:     7,
        })
        document.querySelector('#count').textContent = (65536).toLocaleString()
      }
      else {
        const spec = SHAPES[name]
        emitter = createEmitter({
          capacity:   20000,
          rate:       6000,
          lifetime:   [1, 3],
          size:       0.12,
          sizeCurve:  [[0, 0.2], [0.15, 1], [1, 0.4]],
          alphaCurve: [[0, 0], [0.08, 1], [0.7, 1], [1, 0]],
          rotation:   [-3, 3],
          seed:       7,
          ...spec,
        })
        document.querySelector('#count').textContent = (20000).toLocaleString()
      }
      emitter.object.position.y = gpuMode ? 4 : 0.5
      sceneRef.add(emitter.object)
    }

    const shapeBar = document.querySelector('#shapes')
    const shapeButtons = Object.keys(SHAPES).map(name => {
      const b = document.createElement('button')
      b.textContent = name
      b.setAttribute('aria-pressed', String(name === 'fountain'))
      b.addEventListener('click', () => {
        shapeButtons.forEach(x => x.setAttribute('aria-pressed', String(x === b)))
        if (!gpuMode)
          mount(name)
      })
      shapeBar.appendChild(b)
      return b
    })

    const gpuButton = document.querySelector('#gpu')
    gpuButton.addEventListener('click', () => {
      gpuMode = !gpuMode
      gpuButton.setAttribute('aria-pressed', String(gpuMode))
      mount(currentShape())
    })
    document.querySelector('#burst').addEventListener('click', () => emitter?.burst(500))

    const currentShape = () =>
      shapeButtons.find(b => b.getAttribute('aria-pressed') === 'true')?.textContent ?? 'fountain'

    const fpsEl = document.querySelector('#fps')
    let acc = 0, frames = 0

    bootstrapScene({
      canvas: document.querySelector('#scene'),
      onSetup ({ scene, renderer, camera }) {
        sceneRef = scene
        rendererRef = renderer
        camera.position.set(6, 5, 9)
        camera.lookAt(0, 2, 0)
        mount('fountain')
        return (ctx) => {
          emitter.tick(ctx)
          acc += ctx.delta; frames += 1
          if (acc >= 0.5) { fpsEl.textContent = Math.round(frames / acc); acc = 0; frames = 0 }
        }
      },
    })
    window.__SCENE_READY__ = true

    // perf: CPU emitter = one InstancedBufferGeometry draw + O(capacity) JS per
    // tick. GPU field = two compute passes + one Points draw; CPU cost ~zero.
  </script>
</body>
</html>
