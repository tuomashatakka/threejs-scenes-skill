<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Icaras Foundry · real-mesh ship forge</title>
<style>
  :root {
    --ink-950: #08050f; --ink-900: #110a1c; --ink-850: #160d24; --ink-800: #1c1230; --ink-700: #2a1c44;
    --line: rgba(255,120,180,0.14); --line-strong: rgba(255,120,180,0.32);
    --pink: #ff5a96; --pink-bright: #ff86b6; --pink-dim: rgba(255,134,182,0.55);
    --cyan: #36d6ff; --violet: #b06bff; --gold: #ffd34d;
    --text: #f3dce8; --text-dim: rgba(243,220,232,0.46);
    --mono: 'SFMono-Regular', ui-monospace, 'Roboto Mono', monospace; --sans: 'Inter', system-ui, sans-serif;
  }
  * { box-sizing: border-box }
  html, body { margin: 0; height: 100%; background: var(--ink-950); overflow: hidden; font-family: var(--sans); color: var(--text) }
  #app { display: grid; grid-template-columns: 1fr 296px; height: 100%; transition: grid-template-columns .25s }
  #app.collapsed { grid-template-columns: 1fr 0 }

  main { position: relative; background: var(--ink-950); min-width: 0 }
  canvas { display: block; width: 100%; height: 100%; touch-action: none }
  #overlay { position: absolute; inset: 0; pointer-events: none }
  #overlay line { stroke: var(--cyan); stroke-width: 1; opacity: 0.5 }
  #overlay text { fill: var(--cyan); font-family: var(--mono); font-size: 10px; letter-spacing: 0.08em }

  #topbar { position: absolute; top: 12px; left: 14px; right: 14px; display: flex; gap: 7px; align-items: center; pointer-events: none; flex-wrap: wrap }
  #topbar > * { pointer-events: auto }
  #topbar .spacer { flex: 1 }
  #viewbtns { display: none; gap: 6px }
  #viewbtns.show { display: flex }
  button { font-family: var(--sans); font-size: 11px; color: var(--text); background: var(--ink-800);
    border: 1px solid var(--line-strong); border-radius: 0; padding: 7px 10px; cursor: pointer; transition: .14s }
  button:hover { border-color: var(--pink); color: var(--pink-bright) }
  button.on { background: var(--pink); color: var(--ink-950); border-color: var(--pink); font-weight: 700 }
  #hud { position: absolute; bottom: 11px; left: 14px; font-family: var(--mono); font-size: 10px; color: var(--pink-dim); pointer-events: none; line-height: 1.6 }
  #brand { position: absolute; bottom: 11px; right: 14px; font-family: var(--mono); font-size: 9px; color: rgba(255,134,182,0.3); pointer-events: none; letter-spacing: 0.1em }
  #hint { position: absolute; top: 50px; left: 50%; transform: translateX(-50%); font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; color: var(--cyan); text-transform: uppercase; pointer-events: none; opacity: 0; transition: .3s; text-shadow: 0 0 12px #000 }
  #hint.show { opacity: 0.85 }

  aside { background: linear-gradient(180deg, var(--ink-900), var(--ink-950)); border-left: 1px solid var(--line); overflow-y: auto; padding: 16px 14px 48px }
  aside::-webkit-scrollbar { width: 7px } aside::-webkit-scrollbar-thumb { background: var(--line-strong) }
  header h1 { font-size: 14px; letter-spacing: 0.16em; margin: 0; font-weight: 700; text-transform: uppercase }
  header h1 span { color: var(--pink) }
  header p { font-size: 10px; color: var(--text-dim); margin: 4px 0 16px; font-family: var(--mono); line-height: 1.6 }
  fieldset { border: 1px solid var(--line); margin: 0 0 12px; padding: 9px 11px 13px }
  legend { font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--pink-dim); padding: 0 5px; font-weight: 700 }

  label.ctrl { display: block; margin: 10px 0 0 }
  label.ctrl .row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px }
  label.ctrl .name { font-size: 11px } label.ctrl .val { font-size: 10px; color: var(--cyan); font-family: var(--mono) }
  input[type=range] { -webkit-appearance: none; appearance: none; width: 100%; height: 3px; background: var(--ink-700); outline: none; cursor: pointer }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 13px; height: 13px; background: var(--pink); border: 2px solid var(--ink-950); box-shadow: 0 0 8px var(--pink-dim); cursor: pointer }
  input[type=range]::-moz-range-thumb { width: 11px; height: 11px; background: var(--pink); border: 2px solid var(--ink-950); cursor: pointer }

  .swatches { display: flex; gap: 7px; margin-top: 6px; flex-wrap: wrap }
  .swatch { width: 26px; height: 26px; border: 2px solid transparent; cursor: pointer } .swatch.on { border-color: var(--text) }

  .complist { display: flex; flex-direction: column; gap: 5px; margin-top: 4px }
  .comp { display: flex; align-items: center; gap: 8px; padding: 7px 9px; border: 1px solid var(--line-strong); cursor: pointer; transition: .12s }
  .comp:hover { border-color: var(--pink) }
  .comp.on { border-color: var(--cyan); background: rgba(54,214,255,0.08) }
  .comp .dot { width: 8px; height: 8px; flex: 0 0 auto }
  .comp .t { font-size: 11px; font-weight: 600 } .comp .d { font-size: 9px; color: var(--text-dim); font-family: var(--mono) }
  .compcfg { margin-top: 9px; padding-top: 9px; border-top: 1px solid var(--line); font-size: 10px; color: var(--text-dim); font-family: var(--mono); line-height: 1.7 }
  .compcfg.hidden { display: none }
  .toggles { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px } .toggles button { flex: 1 1 auto }

  .itemname { font-size: 16px; font-weight: 800; line-height: 1.2; margin: 2px 0 } .rarity { font-size: 9px; font-family: var(--mono); letter-spacing: 0.24em; text-transform: uppercase; margin-bottom: 12px }
  .stat { margin: 9px 0 0 } .stat .row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 3px }
  .stat .name { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-dim) } .stat .num { font-size: 11px; font-family: var(--mono) }
  .bar { height: 5px; background: var(--ink-800); position: relative; overflow: hidden } .bar i { position: absolute; inset: 0 100% 0 0; transition: right .35s cubic-bezier(.2,.8,.2,1) }
  .affixes { margin-top: 13px; border-top: 1px solid var(--line); padding-top: 11px } .affix { font-size: 11px; font-family: var(--mono); line-height: 1.55; margin: 3px 0; display: flex; gap: 7px }
  .affix .dot { flex: 0 0 auto; width: 6px; height: 6px; margin-top: 5px; border-radius: 50% } .affix.unique { color: var(--gold); font-style: italic }
  .lore { margin-top: 12px; font-size: 10px; font-style: italic; color: var(--text-dim); line-height: 1.55; border-left: 2px solid var(--line-strong); padding-left: 9px }
  .reforge { width: 100%; margin-top: 14px; padding: 9px; font-weight: 700; letter-spacing: 0.1em }
</style>
</head>
<body>
<div id="app">
  <main>
    <canvas id="scene"></canvas>
    <svg id="overlay"></svg>
    <div id="topbar">
      <button id="t-mode" class="on">render</button>
      <div id="viewbtns">
        <button data-view="iso" class="on">iso</button>
        <button data-view="side">side</button>
        <button data-view="top">top</button>
        <button data-view="front">front</button>
      </div>
      <div class="spacer"></div>
      <button id="t-rotate" class="on">orbit</button>
      <button id="t-wire">wire</button>
      <button id="t-pane" class="on">spec ▸</button>
    </div>
    <div id="hint"></div>
    <div id="hud"></div>
    <div id="brand">HUMMINGBIRD DESIGN · WEBGL2 · icaros.obj</div>
  </main>

  <aside>
    <header><h1><span>Icaras</span> Foundry</h1><p>real-mesh forge · parts separated from icaros.obj</p></header>

    <fieldset><legend>Ship geometry</legend><div class="toggles" id="ships"></div></fieldset>
    <fieldset><legend>Mesh · deform</legend><div id="geo-controls"></div></fieldset>
    <fieldset><legend>Engines</legend><div class="toggles" id="engtypes"></div><div id="eng-controls"></div></fieldset>
    <fieldset><legend>Cannons</legend><div class="toggles" id="weptypes"></div><div id="wep-controls"></div></fieldset>
    <fieldset><legend>Hull finish</legend><div class="swatches" id="skins"></div><div id="scene-controls"></div></fieldset>

    <fieldset><legend>Components</legend>
      <div class="complist" id="complist"></div>
      <div class="compcfg hidden" id="compcfg"></div>
      <div class="toggles">
        <button id="b-resetparts">reset positions</button>
      </div>
    </fieldset>

    <fieldset><legend>Vessel spec</legend>
      <div class="itemname" id="i-name">—</div>
      <div class="rarity" id="i-rarity">—</div>
      <div id="i-stats"></div>
      <div class="affixes" id="i-affixes"></div>
      <div class="lore" id="i-lore"></div>
      <button class="reforge" id="b-reforge">⚒ reforge affixes</button>
    </fieldset>

    <fieldset><legend>Forge</legend>
      <div class="toggles"><button id="b-random">randomize ✦</button><button id="b-reset">reset all</button></div>
    </fieldset>
  </aside>
</div>

// ───────────── stats
function computeStats () {
  const eOn = (parts.engineL.enabled ? 1 : 0) + (parts.engineR.enabled ? 1 : 0)
  const wOn = (parts.cannonL.enabled ? 1 : 0) + (parts.cannonR.enabled ? 1 : 0)
  const eS = (parts.engineL.userScale + parts.engineR.userScale) / 2
  const wS = (parts.cannonL.userScale + parts.cannonR.userScale) / 2
  const eT = ENGINE_TYPES[ENG.type]
  const mass = 0.6 * cfg.bodyWidth * cfg.verticalHeight * cfg.bodyLength + eS * 0.2 * eOn + wS * 0.18 * wOn + 0.25
  const thrust = ENG.intensity * eS * eOn * 0.5 * (0.8 + eT.beamL * 0.18)
  const topSpeed = (thrust / Math.sqrt(mass)) / (0.55 + cfg.bodyWidth * 0.45) * (1 + (cfg.bodyLength - 1) * 0.18)
  const accel = (thrust / mass) * 1.1
  const handling = 1 / (0.6 + cfg.bodyWidth * 0.5) / (0.7 + cfg.bodyLength * 0.4) * (1.1 - wS * 0.1) + 0.1
  const durability = cfg.bodyWidth * cfg.verticalHeight * cfg.bodyLength * 0.95 + 0.1
  const fpMap = { beam: 1.35, rail: 1.55, plasma: 1.0, pulse: 0.85, scatter: 1.15, stock: 0.7 }
  const firepower = wS * wOn * 0.5 * (fpMap[WEP.type] || 1)
  return { topSpeed, accel, handling, durability, firepower, mass }
}

function frameSelected () { /* keep current view; selection box already shown */ }
function addWire () { if (wireHull) return; wireHull = new THREE.LineSegments(new THREE.WireframeGeometry(hull.geometry), new THREE.LineBasicMaterial({ color: 0xff86b6, transparent: true, opacity: 0.35 })); hull.add(wireHull) }
function clearWire () { if (wireHull) { hull.remove(wireHull); wireHull.geometry.dispose(); wireHull = null } }
function setMode (toSchematic) {
  schematic = toSchematic
  camera = schematic ? ortho : persp; renderPass.camera = camera
  controls.enabled = !schematic; bloom.enabled = !schematic; grid.visible = schematic
  scene.background.set(schematic ? 0x06080f : 0x07040f)
  document.getElementById('viewbtns').classList.toggle('show', schematic)
  if (schematic) { for (const f of engineFX) f.setVisible(false); for (const f of cannonFX) f.setVisible(false) }
  boxHelper.visible = schematic && !!selected
  if (schematic) { addWire(); setOrthoView(curView); showHint('drag parts to move · scroll to resize · click empty to deselect') }
  else { if (!showWire) clearWire(); ship.rotation.set(0, 0, 0) }
}
let hintT = 0
const hintEl = document.getElementById('hint')
function showHint (txt) { hintEl.textContent = txt; hintEl.classList.add('show'); hintT = 3.5 }

// ───────────── topbar
const tMode = document.getElementById('t-mode'), tRotate = document.getElementById('t-rotate'), tWire = document.getElementById('t-wire'), tPane = document.getElementById('t-pane')
tMode.onclick = () => { const s = !schematic; tMode.classList.toggle('on', !s); tMode.textContent = s ? 'schematic' : 'render'; setMode(s) }
tRotate.onclick = () => { controls.autoRotate = !controls.autoRotate; tRotate.classList.toggle('on', controls.autoRotate) }
tWire.onclick = () => { showWire = !showWire; tWire.classList.toggle('on', showWire); if (showWire) addWire(); else if (!schematic) clearWire() }
tPane.onclick = () => { const a = document.getElementById('app'); a.classList.toggle('collapsed'); const open = !a.classList.contains('collapsed'); tPane.classList.toggle('on', open); tPane.textContent = open ? 'spec ▸' : '◂ spec'; onResize() }
for (const b of document.querySelectorAll('#viewbtns button')) b.onclick = () => { for (const x of document.querySelectorAll('#viewbtns button')) x.classList.remove('on'); b.classList.add('on'); setOrthoView(b.dataset.view) }

document.getElementById('b-reforge').onclick = () => { cfg.seed = (Math.random() * 1e9) | 0; affixState = rollAffixes(cfg.seed); renderCard() }
document.getElementById('b-resetparts').onclick = () => { for (const n of PART_KEYS) { parts[n].userScale = 1; parts[n].mesh.position.copy(parts[n].base); parts[n].enabled = true } applyDeform(); if (selected) { boxHelper.setFromObject(parts[selected].mesh); renderCompCfg() } buildComps(); selectedKeep(); renderCard() }
document.getElementById('b-reset').onclick = () => {
  Object.assign(cfg, { bodyWidth: 1, verticalHeight: 1, bodyLength: 1, normalScale: 1, bloom: 0.9 })
  Object.assign(ENG, { intensity: 1, plumeLen: 1, rate: 1 }); Object.assign(WEP, { fireRate: 1, charge: 1, length: 1 })
  for (const n of PART_KEYS) { parts[n].userScale = 1; parts[n].mesh.position.copy(parts[n].base); parts[n].enabled = true }
  refreshSliders(geoHost, cfg); refreshSliders(engHost, ENG); refreshSliders(wepHost, WEP); refreshSliders(sceneHost, cfg)
  bloom.strength = cfg.bloom; hullMat.normalScale.set(1, 1); applyFinish(); applyDeform(); buildComps(); selectPart(null); renderCard()
}
document.getElementById('b-random').onclick = () => {
  const rng = mulberry32((Math.random() * 1e9) | 0)
  for (const [k, , min, max] of GEO_SPECS) cfg[k] = min + rng() * (max - min)
  cfg.skin = SKINS[(rng() * SKINS.length) | 0].id
  const eks = Object.keys(ENGINE_TYPES), wks = Object.keys(CANNON_TYPES)
  ENG.type = eks[(rng() * eks.length) | 0]; WEP.type = wks[(rng() * wks.length) | 0]
  ENG.intensity = 0.6 + rng() * 1.6; WEP.fireRate = 0.5 + rng() * 2
  for (const n of PART_KEYS) parts[n].userScale = 0.6 + rng() * 1.6
  cfg.seed = (rng() * 1e9) | 0; affixState = rollAffixes(cfg.seed)
  refreshSliders(geoHost, cfg); refreshSliders(engHost, ENG); refreshSliders(wepHost, WEP); buildSkins(); buildEngTypes(); buildWepTypes()
  applyFinish(); hullMat.normalScale.set(cfg.normalScale, cfg.normalScale); rebuildCat('engine'); rebuildCat('cannon'); applyDeform(); buildComps(); if (selected) renderCompCfg(); renderCard()
  if (schematic) setOrthoView(curView)
}

// ───────────── pointer interaction (schematic drag / resize)
const pointer = new THREE.Vector2(), dragRay = new THREE.Raycaster(), dragPlane = new THREE.Plane(), planeHit = new THREE.Vector3(), camFwd = new THREE.Vector3()
let dragging = null
function setPointer (e) { const r = canvas.getBoundingClientRect(); pointer.x = ((e.clientX - r.left) / r.width) * 2 - 1; pointer.y = -((e.clientY - r.top) / r.height) * 2 + 1 }
function pickPart (e) {
  setPointer(e); dragRay.setFromCamera(pointer, camera)
  const meshes = PART_KEYS.map(n => parts[n].mesh)
  const hit = dragRay.intersectObjects(meshes, false)[0]
  return hit ? hit.object.userData.part : null
}
canvas.addEventListener('pointerdown', e => {
  if (!schematic) return
  const name = pickPart(e)
  if (name) { selectPart(name); dragging = name; canvas.setPointerCapture(e.pointerId) }
  else selectPart(null)
})
canvas.addEventListener('pointermove', e => {
  if (!schematic || !dragging) return
  setPointer(e); dragRay.setFromCamera(pointer, camera)
  // drag on the plane that passes through the part and faces the camera
  const wp = new THREE.Vector3(); parts[dragging].mesh.getWorldPosition(wp)
  camera.getWorldDirection(camFwd)
  dragPlane.setFromNormalAndCoplanarPoint(camFwd, wp)
  if (dragRay.ray.intersectPlane(dragPlane, planeHit)) { snapToHull(dragging, planeHit); boxHelper.setFromObject(parts[dragging].mesh); renderCompCfg(); selectedKeep() }
})
function endDrag (e) { if (dragging) { dragging = null; if (canvas.hasPointerCapture(e.pointerId)) canvas.releasePointerCapture(e.pointerId); renderCard() } }
canvas.addEventListener('pointerup', endDrag)
canvas.addEventListener('pointercancel', endDrag)
canvas.addEventListener('wheel', e => {
  if (!schematic || !selected) return
  e.preventDefault()
  const p = parts[selected]; p.userScale = clamp(p.userScale * (1 - e.deltaY * 0.0012), 0.4, 2.6)
  applyDeform(); boxHelper.setFromObject(p.mesh); renderCompCfg(); buildComps(); selectedKeep(); renderCard()
}, { passive: false })

// (engine + cannon fx are driven live in the render loop)

// ───────────── schematic dimension overlay
const overlay = document.getElementById('overlay')
const UNIT_M = 8.0
const corners = Array.from({ length: 8 }, () => new THREE.Vector3()), projTmp = new THREE.Vector3()
function drawDims () {
  overlay.innerHTML = ''
  if (!schematic) return
  const box = shipBox(), W = stage.clientWidth, H = stage.clientHeight, min = box.min, max = box.max
  let k = 0
  for (const xx of [min.x, max.x]) for (const yy of [min.y, max.y]) for (const zz of [min.z, max.z]) corners[k++].set(xx, yy, zz)
  let sx0 = Infinity, sy0 = Infinity, sx1 = -Infinity, sy1 = -Infinity
  for (const cc of corners) { projTmp.copy(cc).project(ortho); const px = (projTmp.x * 0.5 + 0.5) * W, py = (-projTmp.y * 0.5 + 0.5) * H; sx0 = Math.min(sx0, px); sy0 = Math.min(sy0, py); sx1 = Math.max(sx1, px); sy1 = Math.max(sy1, py) }
  const len = ((max.z - min.z) * UNIT_M).toFixed(1) + ' m', span = ((max.x - min.x) * UNIT_M).toFixed(1) + ' m', height = ((max.y - min.y) * UNIT_M).toFixed(1) + ' m'
  const hLabel = curView === 'top' || curView === 'front' ? span : len
  const vLabel = curView === 'top' ? len : height
  const m = 26, ns = 'http://www.w3.org/2000/svg'
  const mk = (t, at) => { const el = document.createElementNS(ns, t); for (const a in at) el.setAttribute(a, at[a]); return el }
  function dim (x1, y1, x2, y2, txt, vert) {
    overlay.appendChild(mk('line', { x1, y1, x2, y2 })); const tk = 5
    if (vert) { overlay.appendChild(mk('line', { x1: x1 - tk, y1, x2: x1 + tk, y2: y1 })); overlay.appendChild(mk('line', { x1: x2 - tk, y1: y2, x2: x2 + tk, y2 })) } else { overlay.appendChild(mk('line', { x1, y1: y1 - tk, x2: x1, y2: y1 + tk })); overlay.appendChild(mk('line', { x1: x2, y1: y2 - tk, x2: x2, y2: y2 + tk })) }
    const tx = mk('text', { x: (x1 + x2) / 2, y: (y1 + y2) / 2 - (vert ? 0 : 6), 'text-anchor': 'middle' }); if (vert) tx.setAttribute('transform', `rotate(-90 ${(x1 + x2) / 2} ${(y1 + y2) / 2})`); tx.textContent = txt; overlay.appendChild(tx)
  }
  if (isFinite(sx0)) { dim(sx0, sy1 + m, sx1, sy1 + m, hLabel, false); dim(sx0 - m, sy0, sx0 - m, sy1, vLabel, true) }
}

renderCard()

// ───────────── loop
const clock = new THREE.Clock(), hud = document.getElementById('hud'), tmp = new THREE.Vector3()
const muzWorld = new THREE.Vector3(), engWorld = new THREE.Vector3()
let acc = 0
function frame () {
  requestAnimationFrame(frame)
  let dt = clock.getDelta(); if (dt > 0.05) dt = 0.05
  const t = clock.elapsedTime
  if (!schematic) controls.update()
  ;['engineL', 'engineR'].forEach((n, i) => { const p = parts[n]; if (!schematic && p.enabled) { p.mesh.getWorldPosition(engWorld); engineFX[i].update(dt, t, engWorld) } else engineFX[i].setVisible(false) })
  ;['cannonL', 'cannonR'].forEach((n, i) => { const p = parts[n]; if (!schematic && p.enabled) { p.mesh.getWorldPosition(muzWorld); cannonFX[i].update(dt, t, muzWorld) } else cannonFX[i].setVisible(false) })

  if (hintT > 0) { hintT -= dt; if (hintT <= 0) hintEl.classList.remove('show') }

  acc += dt
  if (acc > 0.12) {
    acc = 0
    if (schematic) hud.textContent = `BLUEPRINT · ${curView.toUpperCase()} · drag/scroll parts · grid 1.0u = ${UNIT_M.toFixed(1)}m`
    else { hud.textContent = `${SHIPS[cfg.ship].label} · ${ENG.type} drive · ${WEP.type} cannons` }
  }
  if (schematic) { boxHelper.update(); drawDims() }
  composer.render()
}
frame()

function onResize () {
  const w = stage.clientWidth, h = stage.clientHeight
  renderer.setSize(w, h, false); composer.setSize(w, h); bloom.setSize(w, h)
  persp.aspect = w / h; persp.updateProjectionMatrix()
  if (schematic) setOrthoView(curView)
}
new ResizeObserver(onResize).observe(stage)
</script>
</body>
</html>
