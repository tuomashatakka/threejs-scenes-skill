<!DOCTYPE html>
<!--
  shader-material.html — custom GLSL ShaderMaterial
  ─────────────────────────────────────────────────
  Self-contained. Open directly in a browser (loads `three` from esm.sh).

  A holographic material: fresnel rim glow + animated scanlines + flowing
  noise. Template for ANY custom shader. Key lessons:
    - vertex shader passes world normal + view dir to the fragment stage
    - a uniform declared on only ONE stage silently kills the material —
      keep the uniform block identical where shared
    - uniforms are MUTATED in the loop (uTime.value = ...), never reassigned,
      so there are zero per-frame allocations
    - GLSL lives in /* glsl */ template literals for editor highlighting
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>three.js · shader material</title>
  <style>
    html, body { margin: 0; height: 100%; background: #02060a; overflow: hidden; font-family: ui-monospace, monospace }
    main { position: fixed; inset: 0 }
    canvas { display: block; width: 100%; height: 100%; touch-action: none }
    aside { position: fixed; top: 12px; left: 12px; padding: 8px 12px; color: #9fe8ff;
      background: rgba(2, 6, 10, 0.6); border: 1px solid #143a44; border-radius: 6px;
      font-size: 12px; line-height: 1.6; pointer-events: none }
  </style>
</head>
<body>
  <main>
    <canvas id="scene"></canvas>
    <aside>
      <div>three.js · holographic ShaderMaterial</div>
      <div>drag to orbit</div>
    </aside>
  </main>

  <script type="importmap">
  { "imports": { "three": "https://esm.sh/three@0.184.0" } }
  </script>

  <script type="module">
    import * as THREE from 'three'

    const vertexShader = /* glsl */`
      varying vec3 vNormalW;
      varying vec3 vViewDir;
      varying vec3 vPosL;
      void main () {
        vec4 worldPos = modelMatrix * vec4(position, 1.0);
        vNormalW = normalize(mat3(modelMatrix) * normal);
        vViewDir = normalize(cameraPosition - worldPos.xyz);
        vPosL = position;
        gl_Position = projectionMatrix * viewMatrix * worldPos;
      }
    `

    const fragmentShader = /* glsl */`
      uniform float uTime;
      uniform vec3  uColor;
      uniform float uScanDensity;
      uniform float uRimPower;
      varying vec3 vNormalW;
      varying vec3 vViewDir;
      varying vec3 vPosL;

      // cheap hash noise
      float hash (vec3 p) {
        p = fract(p * 0.3183099 + 0.1);
        p *= 17.0;
        return fract(p.x * p.y * p.z * (p.x + p.y + p.z));
      }

      void main () {
        // fresnel rim — bright at grazing angles
        float fresnel = pow(1.0 - max(dot(vNormalW, vViewDir), 0.0), uRimPower);

        // horizontal scanlines drifting upward over time
        float scan = 0.5 + 0.5 * sin((vPosL.y * uScanDensity) - uTime * 3.0);

        // flowing noise flicker
        float n = hash(vPosL * 4.0 + uTime * 0.4);

        vec3 col = uColor * (0.25 + 0.75 * scan) + fresnel * uColor * 2.0;
        float alpha = clamp(fresnel + scan * 0.35 + n * 0.05, 0.15, 1.0);
        gl_FragColor = vec4(col, alpha);
      }
    `

    function createHolographicMaterial ({ color = '#3fe0ff' } = {}) {
      return new THREE.ShaderMaterial({
        vertexShader,
        fragmentShader,
        uniforms: {
          uTime:        { value: 0 },
          uColor:       { value: new THREE.Color(color) },
          uScanDensity: { value: 18 },
          uRimPower:    { value: 2.5 },
        },
        transparent: true,
        side: THREE.DoubleSide,
        depthWrite: false,
        blending: THREE.AdditiveBlending,
      })
    }

    // ── scaffold ────────────────────────────────────────────────────
    const canvas = document.querySelector('#scene')
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false })
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2))
    renderer.outputColorSpace = THREE.SRGBColorSpace
    const scene = new THREE.Scene()
    scene.background = new THREE.Color('#02060a')
    const camera = new THREE.PerspectiveCamera(50, canvas.clientWidth / canvas.clientHeight, 0.1, 100)
    const orbit = { theta: 0.5, phi: 0.3, radius: 5 }
    const updateCamera = () => {
      const r = orbit.radius * Math.cos(orbit.phi)
      camera.position.set(Math.sin(orbit.theta) * r, Math.sin(orbit.phi) * orbit.radius, Math.cos(orbit.theta) * r)
      camera.lookAt(0, 0, 0)
    }
    updateCamera()
    new ResizeObserver((e) => {
      const { width, height } = e[0].contentRect
      renderer.setSize(width, height, false)
      camera.aspect = width / height; camera.updateProjectionMatrix()
    }).observe(canvas.parentElement)

    const pts = new Map()
    canvas.style.touchAction = 'none'
    canvas.addEventListener('pointerdown', (e) => { canvas.setPointerCapture(e.pointerId); pts.set(e.pointerId, { x: e.clientX, y: e.clientY }) })
    canvas.addEventListener('pointermove', (e) => {
      const p = pts.get(e.pointerId); if (!p) return
      orbit.theta -= (e.clientX - p.x) * 0.005
      orbit.phi = Math.max(-1.3, Math.min(1.3, orbit.phi + (e.clientY - p.y) * 0.005))
      p.x = e.clientX; p.y = e.clientY; updateCamera()
    })
    const up = (e) => pts.delete(e.pointerId)
    canvas.addEventListener('pointerup', up); canvas.addEventListener('pointercancel', up)
    canvas.addEventListener('wheel', (e) => { e.preventDefault(); orbit.radius = Math.max(2.5, Math.min(20, orbit.radius * (1 + e.deltaY * 0.001))); updateCamera() }, { passive: false })

    // ── the subject ─────────────────────────────────────────────────
    const material = createHolographicMaterial({ color: '#3fe0ff' })
    const mesh = new THREE.Mesh(new THREE.TorusKnotGeometry(1, 0.32, 160, 24), material)
    scene.add(mesh)
    renderer.compile(scene, camera)

    const clock = new THREE.Clock()
    function tick () {
      const elapsed = clock.getElapsedTime()
      material.uniforms.uTime.value = elapsed   // mutate, never reassign
      mesh.rotation.y = elapsed * 0.3
      renderer.render(scene, camera)
      requestAnimationFrame(tick)
    }
    requestAnimationFrame(tick)
    window.__SCENE_READY__ = true

    // perf: cheap. one transparent additive mesh, one shader program.
  </script>
</body>
</html>
