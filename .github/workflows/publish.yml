name: Publish showcase & skill

# Publishes the public/ showcase to GitHub Pages and packages skill/ into a
# downloadable threejs-scenes.skill served alongside it. Requires Pages source
# set to "GitHub Actions" once in repo Settings → Pages.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: read
  pages: write
  id-token: write

# Queue Pages runs instead of cancelling: a run cancelled mid-deploy strands an
# "in progress" deployment server-side, and every later deploy then 400s with
# "cancel <sha> first" until it is cancelled via the API.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Build library and package skill
        env:
          GH_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          bun install --frozen-lockfile
          # tsc build + copy-lib refreshes skill/lib/dist and public/lib/dist,
          # then package-skill.ts validates SKILL.md and zips skill/ into
          # threejs-scenes.skill (extracts to threejs-scenes/).
          bun run build
          bun run scripts/package-skill.ts

      - name: Assemble site
        run: |
          set -euo pipefail
          mkdir -p _site
          cp -r public/. _site/
          cp threejs-scenes.skill _site/
          ls -la _site

      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
