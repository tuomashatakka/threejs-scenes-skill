name: Publish showcase & skill

# Publishes the public/ showcase to GitHub Pages and packages skill/ into a
# downloadable threejs-scenes.skill served alongside it. Requires Pages source
# set to "GitHub Actions" once in repo Settings → Pages.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble site and package skill
        run: |
          set -euo pipefail
          mkdir -p _site
          cp -r public/. _site/
          # Package skill/ as threejs-scenes.skill (a zip that extracts to
          # threejs-scenes/), matching the installable skill bundle layout.
          cp -r skill threejs-scenes
          find threejs-scenes -name '.DS_Store' -delete
          zip -r -X _site/threejs-scenes.skill threejs-scenes
          ls -la _site

      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
