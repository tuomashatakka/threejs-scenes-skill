name: Publish package, showcase & skill

# Publishes the npm package to GitHub Packages, creates a GitHub release with
# the .skill archive + npm tarball (both downloadable without a token), then
# publishes the vite-built site and packaged threejs-scenes.skill to GitHub
# Pages. Requires Pages source set to "GitHub Actions" once in repo Settings → Pages.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write # create releases + upload release assets
  packages: write
  pages: write
  id-token: write

# Queue Pages runs instead of cancelling: a run cancelled mid-deploy strands an
# "in progress" deployment server-side, and every later deploy then 400s with
# "cancel <sha> first" until it is cancelled via the API.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Build library and package skill
        env:
          # Private GitHub Packages dependencies can only be read by the
          # workflow GITHUB_TOKEN when those packages have granted this repo
          # access. Use PACKAGES_TOKEN (classic PAT with read:packages/write:packages) when
          # they live in a different/private package repo, and fall back to the
          # workflow token for linked packages.
          GH_PAT: ${{ secrets.PACKAGES_TOKEN || github.token }}
        run: |
          set -euo pipefail
          if [ -z "${GH_PAT:-}" ]; then
            echo "GH_PAT is required to install @tuomashatakka packages from GitHub Packages" >&2
            exit 1
          fi
          bun install --frozen-lockfile
          # tsc build + copy-lib refreshes skill/lib/dist and site/public/lib/dist,
          # docs generates vite site data, vite builds site-dist, then
          # package-skill.ts validates SKILL.md and zips skill/ into
          # threejs-scenes.skill (extracts to threejs-scenes/).
          bun run build
          bun run scripts/package-skill.ts

      - name: Pack npm tarball
        run: |
          set -euo pipefail
          # npm pack produces the same tarball `bun publish` would upload
          # (tuomashatakka-threejs-scenes-<version>.tgz). It is attached to the
          # GitHub release and copied onto the Pages site so the package can be
          # installed without a GitHub Packages token:
          #   npm install https://github.com/${{ github.repository }}/releases/latest/download/threejs-scenes.tgz
          npm pack --ignore-scripts
          cp tuomashatakka-threejs-scenes-*.tgz threejs-scenes.tgz
          ls -la ./*.tgz threejs-scenes.skill

      - name: Publish package to GitHub Packages
        if: github.event_name == 'push'
        env:
          GH_PAT: ${{ secrets.PACKAGES_TOKEN || github.token }}
        run: |
          set -euo pipefail
          PKG_VER=$(node -p "require('./package.json').version")

          # Skip publishing when this version already exists on the registry.
          # npm view resolves auth from .npmrc (${GH_PAT}); the raw
          # npm.pkg.github.com/<pkg>/<version> endpoint used previously does
          # not reliably return 200 for existing versions, which let publish
          # run into a 409. As a second guard, a 409 "cannot publish over
          # existing version" from bun publish is treated as already-published
          # instead of failing the run — any other publish error still fails.
          if npm view "@tuomashatakka/threejs-scenes@$PKG_VER" version >/dev/null 2>&1; then
            echo "Version $PKG_VER already published — skipping"
          elif OUT=$(bun publish --registry https://npm.pkg.github.com 2>&1); then
            echo "$OUT"
          elif echo "$OUT" | grep -qiE 'cannot publish over existing version|409 conflict'; then
            echo "$OUT"
            echo "Version $PKG_VER already published (409) — continuing"
          else
            echo "$OUT" >&2
            exit 1
          fi

      - name: Publish package to npm registry
        if: github.event_name == 'push'
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${NPM_TOKEN:-}" ]; then
            echo "NPM_TOKEN secret not set — skipping npmjs publish" >&2
            exit 0
          fi
          PKG_VER=$(node -p "require('./package.json').version")

          # Same idempotency guard as the GitHub Packages step, pointed at
          # npmjs explicitly since .npmrc's scope mapping defaults @tuomashatakka
          # to GitHub Packages. Scoped packages need --access public here.
          if npm view --registry https://registry.npmjs.org "@tuomashatakka/threejs-scenes@$PKG_VER" version >/dev/null 2>&1; then
            echo "Version $PKG_VER already published — skipping"
          elif OUT=$(bun publish --registry https://registry.npmjs.org --access public 2>&1); then
            echo "$OUT"
          elif echo "$OUT" | grep -qiE 'cannot publish over existing version|409 conflict'; then
            echo "$OUT"
            echo "Version $PKG_VER already published (409) — continuing"
          else
            echo "$OUT" >&2
            exit 1
          fi

      - name: Create GitHub release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          PKG_VER=$(node -p "require('./package.json').version")
          TAG="v$PKG_VER"

          # One release per version; re-runs of an already-released version
          # refresh the assets instead of failing.
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG already exists — refreshing assets"
          else
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "threejs-scenes $PKG_VER" \
              --generate-notes
          fi
          gh release upload "$TAG" --repo "$GITHUB_REPOSITORY" --clobber \
            threejs-scenes.skill \
            threejs-scenes.tgz \
            tuomashatakka-threejs-scenes-"$PKG_VER".tgz

      - name: Assemble site
        run: |
          set -euo pipefail
          test -f site-dist/index.html
          mkdir -p _site
          cp -r site-dist/. _site/
          cp threejs-scenes.skill _site/
          # tokenless npm install straight from Pages:
          #   npm install https://tuomashatakka.github.io/threejs-scenes-skill/threejs-scenes.tgz
          cp threejs-scenes.tgz _site/
          cp tuomashatakka-threejs-scenes-*.tgz _site/
          ls -la _site

      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
