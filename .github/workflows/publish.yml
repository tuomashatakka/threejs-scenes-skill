name: Publish package, showcase & skill

# Publishes the npm package to GitHub Packages, then publishes the public/
# showcase and packaged threejs-scenes.skill to GitHub Pages. Requires Pages source
# set to "GitHub Actions" once in repo Settings → Pages.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  pages: write
  id-token: write

# Queue Pages runs instead of cancelling: a run cancelled mid-deploy strands an
# "in progress" deployment server-side, and every later deploy then 400s with
# "cancel <sha> first" until it is cancelled via the API.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Build library and package skill
        env:
          # Private GitHub Packages dependencies can only be read by the
          # workflow GITHUB_TOKEN when those packages have granted this repo
          # access. Use PACKAGES_TOKEN (classic PAT with read:packages/write:packages) when
          # they live in a different/private package repo, and fall back to the
          # workflow token for linked packages.
          GH_PAT: ${{ secrets.PACKAGES_TOKEN || github.token }}
        run: |
          set -euo pipefail
          if [ -z "${GH_PAT:-}" ]; then
            echo "GH_PAT is required to install @tuomashatakka packages from GitHub Packages" >&2
            exit 1
          fi
          bun install --frozen-lockfile
          # tsc build + copy-lib refreshes skill/lib/dist and public/lib/dist,
          # then package-skill.ts validates SKILL.md and zips skill/ into
          # threejs-scenes.skill (extracts to threejs-scenes/).
          bun run build
          bun run scripts/package-skill.ts

      - name: Publish package to GitHub Packages
        if: github.event_name == 'push'
        env:
          GH_PAT: ${{ secrets.PACKAGES_TOKEN || github.token }}
        run: |
          set -euo pipefail
          PKG_VER=$(node -p "require('./package.json').version")

          # Check if this version already exists on the registry to avoid
          # "Cannot publish over existing version" errors for unchanged versions.
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token $GH_PAT" \
            "https://npm.pkg.github.com/@tuomashatakka%2fthreejs-scenes/$PKG_VER" \
            2>/dev/null || echo "000")

          if [ "$HTTP_STATUS" = "200" ]; then
            echo "Version $PKG_VER already published — skipping"
          else
            bun publish --registry https://npm.pkg.github.com
          fi

      - name: Assemble site
        run: |
          set -euo pipefail
          mkdir -p _site
          cp -r public/. _site/
          cp threejs-scenes.skill _site/
          ls -la _site

      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
