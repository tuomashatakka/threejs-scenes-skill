<!DOCTYPE html>
<!--
  post-processing.html — EffectComposer cinematic chain
  ─────────────────────────────────────────────────────
  Self-contained. Open directly in a browser (loads `three` + addons from esm.sh).

  Chain order (from the scene/core production pattern):
    RenderPass -> UnrealBloomPass -> ShaderPass(GradeShader) -> OutputPass
  Lessons:
    - the grade (tint/contrast/saturation/vignette/grain/chromatic aberration)
      runs in LINEAR HDR, BEFORE tone-mapping
    - tone-mapping + sRGB conversion happen ONCE, at OutputPass — do not also
      set renderer.toneMapping or you double-correct
    - composer.setSize must track the ResizeObserver, with DPR applied
    - on mobile, skip the heavy passes (gate on navigator.maxTouchPoints)
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>three.js · post-processing</title>
  <style>
    html, body { margin: 0; height: 100%; background: #000; overflow: hidden; font-family: ui-monospace, monospace }
    main { position: fixed; inset: 0 }
    canvas { display: block; width: 100%; height: 100%; touch-action: none }
    aside { position: fixed; top: 12px; left: 12px; padding: 8px 12px; color: #ffd9b0;
      background: rgba(0, 0, 0, 0.5); border: 1px solid #443322; border-radius: 6px;
      font-size: 12px; line-height: 1.6; pointer-events: none }
  </style>
</head>
<body>
  <main>
    <canvas id="scene"></canvas>
    <aside>
      <div>three.js · bloom + grade chain</div>
      <div>drag to orbit · press <b>g</b> to toggle post-fx</div>
    </aside>
  </main>

  <script type="importmap">
  { "imports": { "three": "https://esm.sh/three@0.184.0", "three/addons/": "https://esm.sh/three@0.184.0/addons/" } }
  </script>

  <script type="module">
    import * as THREE from 'three'
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js'
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js'
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js'
    import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js'
    import { OutputPass } from 'three/addons/postprocessing/OutputPass.js'

    // ── colour grade pass (linear HDR) ──────────────────────────────
    const GradeShader = {
      uniforms: {
        tDiffuse:    { value: null },
        uTime:       { value: 0 },
        uTint:       { value: new THREE.Color('#ffeede') },
        uContrast:   { value: 1.08 },
        uSaturation: { value: 1.12 },
        uVignette:   { value: 0.5 },
        uGrain:      { value: 0.06 },
        uAberration: { value: 0.16 },
      },
      vertexShader: /* glsl */`
        varying vec2 vUv;
        void main () { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }
      `,
      fragmentShader: /* glsl */`
        uniform sampler2D tDiffuse;
        uniform float uTime, uContrast, uSaturation, uVignette, uGrain, uAberration;
        uniform vec3 uTint;
        varying vec2 vUv;
        float hash (vec2 p) { return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }
        void main () {
          vec2 c = vUv - 0.5;
          // chromatic aberration — RGB split grows toward the corners
          float amt = uAberration * dot(c, c);
          vec3 col;
          col.r = texture2D(tDiffuse, vUv - c * amt).r;
          col.g = texture2D(tDiffuse, vUv).g;
          col.b = texture2D(tDiffuse, vUv + c * amt).b;
          // tint + contrast (around mid-grey) + saturation
          col *= uTint;
          col = (col - 0.5) * uContrast + 0.5;
          float luma = dot(col, vec3(0.299, 0.587, 0.114));
          col = mix(vec3(luma), col, uSaturation);
          // soft radial vignette
          col *= 1.0 - uVignette * dot(c, c) * 1.6;
          // animated grain
          col += (hash(vUv * uTime * 60.0) - 0.5) * uGrain;
          gl_FragColor = vec4(col, 1.0);
        }
      `,
    }

    // ── scaffold ────────────────────────────────────────────────────
    const canvas = document.querySelector('#scene')
    // NOTE: no renderer.toneMapping here — OutputPass owns tone-mapping
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true })
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2))
    const scene = new THREE.Scene()
    scene.background = new THREE.Color('#05040a')
    const camera = new THREE.PerspectiveCamera(50, canvas.clientWidth / canvas.clientHeight, 0.1, 100)
    const orbit = { theta: 0.5, phi: 0.35, radius: 7 }
    const updateCamera = () => {
      const r = orbit.radius * Math.cos(orbit.phi)
      camera.position.set(Math.sin(orbit.theta) * r, Math.sin(orbit.phi) * orbit.radius, Math.cos(orbit.theta) * r)
      camera.lookAt(0, 0, 0)
    }
    updateCamera()

    // emissive subjects so bloom has something to grab
    scene.add(new THREE.HemisphereLight('#88aaff', '#221133', 0.6))
    const key = new THREE.PointLight('#ff8844', 30, 30); key.position.set(4, 5, 4); scene.add(key)
    const group = new THREE.Group()
    for (let i = 0; i < 6; i++) {
      const hue = i / 6
      const m = new THREE.Mesh(
        new THREE.IcosahedronGeometry(0.5, 0),
        new THREE.MeshStandardMaterial({ color: new THREE.Color().setHSL(hue, 0.7, 0.5), emissive: new THREE.Color().setHSL(hue, 0.9, 0.4), emissiveIntensity: 1.4, flatShading: true }),
      )
      const a = (i / 6) * Math.PI * 2
      m.position.set(Math.cos(a) * 2.2, 0, Math.sin(a) * 2.2)
      group.add(m)
    }
    scene.add(group)

    // ── composer chain ──────────────────────────────────────────────
    const size = new THREE.Vector2()
    renderer.getSize(size)
    const composer = new EffectComposer(renderer)
    composer.addPass(new RenderPass(scene, camera))
    const bloom = new UnrealBloomPass(size, 0.9, 0.5, 0.7) // strength, radius, threshold
    composer.addPass(bloom)
    const grade = new ShaderPass(GradeShader)
    composer.addPass(grade)
    composer.addPass(new OutputPass()) // tone-map + sRGB, once, at the end

    function resize () {
      const w = canvas.parentElement.clientWidth, h = canvas.parentElement.clientHeight
      renderer.setSize(w, h, false)
      composer.setSize(w, h)
      composer.setPixelRatio(Math.min(window.devicePixelRatio, 2))
      camera.aspect = w / h; camera.updateProjectionMatrix()
      bloom.setSize(w, h)
    }
    new ResizeObserver(resize).observe(canvas.parentElement)
    resize()

    // pointer orbit
    const pts = new Map()
    canvas.style.touchAction = 'none'
    canvas.addEventListener('pointerdown', (e) => { canvas.setPointerCapture(e.pointerId); pts.set(e.pointerId, { x: e.clientX, y: e.clientY }) })
    canvas.addEventListener('pointermove', (e) => {
      const p = pts.get(e.pointerId); if (!p) return
      orbit.theta -= (e.clientX - p.x) * 0.005
      orbit.phi = Math.max(-1.3, Math.min(1.3, orbit.phi + (e.clientY - p.y) * 0.005))
      p.x = e.clientX; p.y = e.clientY; updateCamera()
    })
    const up = (e) => pts.delete(e.pointerId)
    canvas.addEventListener('pointerup', up); canvas.addEventListener('pointercancel', up)
    canvas.addEventListener('wheel', (e) => { e.preventDefault(); orbit.radius = Math.max(3, Math.min(20, orbit.radius * (1 + e.deltaY * 0.001))); updateCamera() }, { passive: false })

    let postEnabled = true
    addEventListener('keydown', (e) => { if (e.key === 'g') postEnabled = !postEnabled })

    renderer.compile(scene, camera)
    const clock = new THREE.Clock()
    function tick () {
      const elapsed = clock.getElapsedTime()
      group.rotation.y = elapsed * 0.25
      grade.uniforms.uTime.value = elapsed
      if (postEnabled) composer.render()
      else renderer.render(scene, camera)
      requestAnimationFrame(tick)
    }
    requestAnimationFrame(tick)
    window.__SCENE_READY__ = true

    // perf: medium. bloom = several blur passes at half-res. Disable on
    // low-end mobile (navigator.maxTouchPoints > 0 && small viewport).
  </script>
</body>
</html>
