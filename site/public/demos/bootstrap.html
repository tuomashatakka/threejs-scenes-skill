<!DOCTYPE html>
<!--
  bootstrap.html — the canonical starting point for a library-backed app
  ──────────────────────────────────────────────────────────────────────
  One createApp call = renderer + scene + camera + lighting + orbit + loop.
  Unidirectional flow: input handlers call app.setState(); modules read state
  in update() and write the scene; nothing writes state back from the loop.
  Deterministic: fixed-step clock + seeded rng — same seed, same world.
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>threejs-scenes · bootstrap</title>
  <style>
    html, body { margin: 0; height: 100%; background: #0a0a14; overflow: hidden; font-family: ui-monospace, monospace }
    main { position: fixed; inset: 0 }
    canvas { display: block; width: 100%; height: 100%; touch-action: none }
    aside { position: fixed; top: 12px; left: 12px; padding: 8px 12px; color: #9fe8ff;
      background: rgba(6, 10, 20, 0.65); border: 1px solid #1e3a4a; border-radius: 6px;
      font-size: 12px; line-height: 1.6; pointer-events: none }
  </style>
</head>
<body>
  <main>
    <canvas id="scene"></canvas>
    <aside>
      <div>threejs-scenes · createApp bootstrap</div>
      <div>drag to orbit · click/tap to re-seed the crystal</div>
    </aside>
  </main>

  <script type="importmap">
  {
    "imports": {
      "three":          "https://esm.sh/three@0.184.0",
      "three/addons/":  "https://esm.sh/three@0.184.0/addons/",
      "@tuomashatakka/canvas-loop-framecapper": "../lib/vendor/canvas-loop-framecapper/index.js",
      "react": "https://esm.sh/react@19",
      "@scenes":        "../lib/dist/index.js"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three'
    import { createApp, createClock, createEmitter, createStandardMaterial } from '@scenes'

    // a scene module: build once, project state every tick. never writes state.
    function crystalModule () {
      let mesh, emitter
      return {
        name: 'crystal',
        build (ctx) {
          mesh = new THREE.Mesh(
            new THREE.IcosahedronGeometry(1.2, 0),
            createStandardMaterial('emissive', { emissive: '#79f7ff', emissiveIntensity: 0.6 }),
          )
          mesh.position.y = 1.4
          ctx.scene.add(mesh)

          emitter = createEmitter({
            capacity:   1500,
            shape:      { kind: 'sphere', radius: 1.3, shell: true },
            speed:      [0.2, 0.6],
            gravity:    [0, 0.4, 0],
            lifetime:   [1, 2.5],
            size:       0.08,
            color:      [[0, '#79f7ff'], [1, '#b48bff']],
            seed:       ctx.rng.fork('sparks').int(1, 1e9),
          })
          emitter.object.position.y = 1.4
          ctx.scene.add(emitter.object)
        },
        update (state, frame) {
          mesh.rotation.y = frame.elapsed * 0.5
          mesh.rotation.x = Math.sin(frame.elapsed * 0.3) * 0.3
          mesh.material.emissive.setHSL(state.hue, 0.8, 0.6)
          emitter.tick(frame)
        },
        dispose () {
          mesh.geometry.dispose()
          mesh.material.dispose()
          emitter.dispose()
        },
      }
    }

    const app = createApp({
      canvas:  document.querySelector('#scene'),
      seed:    7,
      clock:   createClock({ mode: 'fixed' }),   // deterministic sim steps
      state:   { hue: 0.52 },
      modules: [crystalModule()],
    })

    // input -> state. the module picks the change up on its next update.
    addEventListener('pointerup', () => app.setState({ hue: Math.random() }))

    app.start()
    window.__SCENE_READY__ = true
  </script>
</body>
</html>
